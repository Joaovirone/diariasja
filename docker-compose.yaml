services:
  # 1. Nosso Banco de Dados
  mysql:
    image: mysql:8.0
    container_name: diarias-ja-mysql
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: verysecret
    ports:
      - "3300:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pverysecret"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Nosso Servidor de Cache
  redis:
    image: redis:alpine
    container_name: diarias-ja-redis
    ports:
      - "6379:6379"

  # 3. Nossa API Spring Boot
  backend:
    build: . 
    container_name: diarias-ja-api
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=mydatabase
      - DB_USER=myuser
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SHOW_SQL=true
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test-local
      - AWS_SECRET_ACCESS_KEY=test-local

volumes:
  mysql_data: