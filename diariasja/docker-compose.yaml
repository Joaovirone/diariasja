services:

  mysql:
    image: 'mysql:latest'
    container_name: diarias-ja-mysql
    environment:
      - 'MYSQL_DATABASE=mydatabase'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3300:3306'

  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'

