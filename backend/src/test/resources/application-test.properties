# 1. Configura um banco de dados H2 rápido em memória
spring.datasource.url=jdbc:h2:mem:diariasjatestdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 2. Deixa o Hibernate criar as tabelas do zero para os testes (ignorando o Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# 3. Desativa as filas da AWS SQS e o Cache (Redis) durante os testes para evitar lentidão
spring.cloud.aws.sqs.enabled=false
spring.cache.type=none

# 4. Credenciais falsas para a AWS parar de reclamar
aws.region=us-east-1
spring.cloud.aws.credentials.access-key=teste-local
spring.cloud.aws.credentials.secret-key=teste-local