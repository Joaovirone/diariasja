# 1. Configuração do Banco H2 (Memória)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Configurações do JPA/Hibernate para rodar liso no H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desliga o Flyway (pois o ddl-auto=create-drop já vai criar as tabelas)
spring.flyway.enabled=false

# 3. Ignora os avisos de JTA (transações complexas que não estamos a usar)
spring.jta.enabled=false

# 4. Desativa as filas da AWS SQS
spring.cloud.aws.sqs.enabled=false
spring.cloud.aws.sqs.listener.auto-startup=false

# 5. Credenciais falsas para a AWS (Garante que a API suba localmente)
aws.region=us-east-1
spring.cloud.aws.credentials.access-key=test-local
spring.cloud.aws.credentials.secret-key=test-local